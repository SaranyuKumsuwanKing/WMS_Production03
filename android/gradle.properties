org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
org.gradle.caching=true
android.useAndroidX=true
android.nonTransitiveRClass=true
kotlin.code.style=official
# Run the Kotlin compiler in-process (avoids a separate daemon needing loopback).
kotlin.compiler.execution.strategy=in-process

# Build with Android Studio's bundled JDK (JBR 21) so a separate JDK install is
# not required. Adjust if Android Studio is installed elsewhere.
org.gradle.java.home=C:/Program Files/Android/Android Studio/jbr
